name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    # These are Serel Memory's own framework-integrity checks. They are meaningless in
    # a downstream project created via `npx degit` (which has its own workflows and
    # memory bank), so the job self-disables outside the canonical repo. Downstream
    # users can safely delete .github/ after install.
    if: github.repository == 'madeordinary/serel-memory'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x tests/*.sh hooks/*.sh

      - name: ShellCheck hooks and tests
        run: shellcheck hooks/*.sh tests/*.sh

      - name: Adapter parity (Claude commands <-> Codex skills)
        run: tests/check-parity.sh

      - name: Sync allowlist never includes user memory
        run: tests/check-allowlist.sh

      - name: Rename compatibility contract
        run: tests/check-compatibility.sh

      - name: degit export ships clean templates
        run: tests/smoke-degit.sh

      - name: Session read list agrees across AGENTS.md, /start, $start, hook
        run: tests/check-readlist.sh

      - name: sync-upstream template-mode procedure works end to end
        run: tests/smoke-sync.sh

  docs:
    # Markdown hygiene for the prompt files themselves. Same repo guard as above —
    # downstream projects own their docs and shouldn't inherit these checks.
    if: github.repository == 'madeordinary/serel-memory'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Markdown lint
        run: npx --yes markdownlint-cli2 "**/*.md"

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --no-progress './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
